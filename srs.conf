listen 10080;

srt_server {
    enabled on;
    listen 10080;
}

http_server {
    enabled on;
    listen 7000;
}

vhost __defaultVhost__ {
    srt {
        enabled on;
    }

    http_remux {
        enabled on;
        mount [vhost]/[app]/[stream].m3u8;
    }

    hls {
        enabled on;
        hls_path /usr/local/srs/objs/nginx/html/hls;
        hls_fragment 3;
        hls_window 60;
        hls_cleanup on;
        hls_dispose 0;
        hls_m3u8_file [app]/[stream].m3u8;
        hls_ts_file [app]/[stream]-[seq].ts;
    }
}