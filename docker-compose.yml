services:
  srs:
    image: srs
    container_name: SRS
    ports:
      - "10080:10080/udp"
      - "10080:10080/tcp"
      - "7000:7000"
    volumes:
      - hls-data:/usr/local/srs/objs/nginx/html/hls

  nginx:
    image: nginx:alpine
    container_name: NGINX
    ports:
      - "7500:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - hls-data:/usr/local/srs/objs/nginx/html/hls:ro

volumes:
  hls-data:
