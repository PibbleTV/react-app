services:
  srs:
    image: srs
    container_name: SRS
    ports:
      - "10080:10080/udp"
    volumes:
      - hls-data:/usr/local/srs/objs/nginx/html/hls/live/

  nginx:
    image: nginx:alpine
    container_name: NGINX
    ports:
      - "7500:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - hls-data:/usr/local/srs/objs/nginx/html/hls/live/:ro

volumes:
  hls-data:
