apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pibbletv-ingress
  namespace: default
spec:
  ingressClassName: nginx
  rules:
    - host: local.pibbletv.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8078
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80

    - host: auth.pibbletv.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
