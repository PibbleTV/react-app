apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pibbletv-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      set $backend_protocol "HTTP";
      set $proxy_ssl_server_name "";
      set $proxy_ssl_name "";
      if ($http_host = "local.pibbletv.com") {
        if ($request_uri ~ ^/api) {
          set $backend_protocol "HTTPS";
          set $proxy_ssl_server_name "on";
          set $proxy_ssl_name "local.pibbletv.com";
        }
      }
      if ($http_host = "auth.pibbletv.com") {
        set $backend_protocol "HTTPS";
        set $proxy_ssl_server_name "on";
        set $proxy_ssl_name "auth.pibbletv.com";
      }
      proxy_set_header X-Backend-Protocol $backend_protocol;
      proxy_ssl_server_name $proxy_ssl_server_name;
      proxy_ssl_name $proxy_ssl_name;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - local.pibbletv.com
        - auth.pibbletv.com
      secretName: pibbletv-tls
  rules:
    - host: local.pibbletv.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8078
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
    - host: auth.pibbletv.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8443
