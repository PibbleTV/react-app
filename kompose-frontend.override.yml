version: "3.8"
services:
  srs:
    ports:
      - "10080:10080/udp"
    expose:
      - "10080"
    labels:
      kompose.service.type: "NodePort"
      kompose.image-pull-secret: "ghcr-credentials"

  nginx:
    ports:
      - "80:80"
    labels:
      kompose.service.type: "LoadBalancer"
      kompose.image-pull-secret: "ghcr-credentials"

volumes:
  hls-data:
    external:
      name: hls-data
  nginx-claim0:
    external:
      name: nginx-claim0
  nginx-claim1:
    external:
      name: nginx-claim1
