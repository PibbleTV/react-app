version: "3.8"
services:
  srs:
    ports:
      - "10080:10080/udp"
      - "10080:10080/tcp"
    labels:
      kompose.service.type: "LoadBalancer"
      kompose.image-pull-secret: "ghcr-credentials"
    annotations:
      service.beta.kubernetes.io/do-loadbalancer-protocol: "tcp,udp"
      service.beta.kubernetes.io/do-loadbalancer-name: "srs-lb"

  nginx:
    ports:
      - "80:80"
    labels:
      kompose.service.type: "LoadBalancer"
      kompose.image-pull-secret: "ghcr-credentials"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
