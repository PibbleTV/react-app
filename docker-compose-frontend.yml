services:
  srs:
    image: ghcr.io/pibbletv/pibbletv-srs:latest
    container_name: SRS
    ports:
      - "10080:10080/udp"
      - "10080:10080/tcp"
    volumes:
      - hls-data:/usr/local/srs/objs/nginx/html/hls/live
    annotations:
      service.beta.kubernetes.io/do-loadbalancer-protocol: "tcp,udp"
      service.beta.kubernetes.io/do-loadbalancer-name: "srs-lb"

  nginx:
    image: ghcr.io/pibbletv/pibbletv-nginx:latest
    container_name: NGINX
    ports:
      - "80:80"
    volumes:
      - hls-data:/usr/local/srs/objs/nginx/html/hls/live:ro

volumes:
  hls-data:
    external:
      name: hls-data
